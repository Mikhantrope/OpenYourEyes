<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PF — Приход</title>
<style>
:root{--bg:#07090f;--s1:#0d1219;--s2:#131a23;--border:#1e2d40;
  --accent:#00c8ff;--green:#00e676;--red:#ff3d57;--amber:#ffaa00;--purple:#b04dff;
  --text:#dde8f5;--muted:#5a7a96;--dim:#2d4055;
  --mono:'IBM Plex Mono',monospace;--body:'IBM Plex Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:12px;}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');

/* NAV */
.nav{display:flex;align-items:center;padding:7px 16px;background:var(--s1);border-bottom:1px solid var(--border);gap:3px;position:sticky;top:0;z-index:200;}
.nl{font-family:'Bebas Neue',sans-serif;font-size:22px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:8px;}
.nav a{padding:4px 8px;border-radius:5px;text-decoration:none;color:var(--muted);font-size:11px;font-weight:600;}
.nav a:hover,.nav a.active{color:var(--text);}
.nav a.active{background:var(--s2);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:35px;z-index:199;}
.conflict-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,61,87,.12);border:1px solid rgba(255,61,87,.4);border-radius:6px;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;}
.conflict-badge:hover{background:rgba(255,61,87,.2);}
.conflict-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
select,input[type=text]{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-size:11px;font-family:var(--body);}
select:focus,input:focus{outline:1px solid var(--accent);}
.btn{padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:var(--s2);color:var(--text);font-size:11px;cursor:pointer;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.active{background:rgba(0,200,255,.12);border-color:var(--accent);color:var(--accent);}
.kpi-row{display:flex;gap:12px;margin-left:auto;flex-wrap:wrap;}
.kpi{text-align:center;}
.kpi-v{font-family:var(--mono);font-size:13px;font-weight:600;}
.kpi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}

/* TABLE */
.wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:6px 8px;text-align:right;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--s1);white-space:nowrap;cursor:pointer;user-select:none;z-index:100;}
thead th:first-child,thead th:nth-child(2){text-align:left;}
thead th:hover{color:var(--text);}
thead th.sa{color:var(--accent);}
thead th.sa::after{content:' ↓';}
thead th.sd{color:var(--accent);}
thead th.sd::after{content:' ↑';}
tbody tr{border-bottom:1px solid rgba(30,45,64,.5);}
tbody tr:hover td{background:rgba(255,255,255,.025);}
tbody tr.conflict-row td{background:rgba(255,61,87,.04);}
tbody tr.conflict-row td:first-child{border-left:2px solid var(--red);}
td{padding:5px 8px;text-align:right;font-size:11px;}
td:first-child{text-align:left;font-family:var(--body);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td:nth-child(2){text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:10px;}
td.num{font-family:var(--mono);}
td.conflict-cell{color:var(--red);font-weight:700;}
.conflict-icon{font-size:11px;margin-left:4px;color:var(--red);}

/* CONFLICT PANEL */
.conflict-panel{display:none;margin:0;padding:10px 14px;background:rgba(255,61,87,.06);border-bottom:1px solid rgba(255,61,87,.3);}
.conflict-panel.show{display:block;}
.conflict-panel h3{font-size:12px;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.conflict-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:6px;max-height:200px;overflow-y:auto;}
.conflict-item{background:rgba(255,61,87,.08);border:1px solid rgba(255,61,87,.25);border-radius:6px;padding:6px 8px;font-size:10px;}
.conflict-item .ci-sku{font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conflict-item .ci-info{color:var(--muted);}
.conflict-item .ci-prices{font-family:var(--mono);color:var(--red);font-weight:600;}

/* PAGINATION */
.pagebar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--s1);}
.pagebar span{font-size:11px;color:var(--muted);}
.page-btn{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--s2);color:var(--muted);font-size:11px;cursor:pointer;}
.page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.page-btn:disabled{opacity:.3;cursor:default;}
.page-info{font-family:var(--mono);font-size:11px;color:var(--text);}
</style>
</head>
<body>

<div class="nav">
  <span class="nl" style="font-family:serif;font-style:italic">PF</span>
  <a href="index.html">📊 Таблица</a>
  <a href="dashboard.html">📈 Дашборд</a>
  <a href="prikhod.html" class="active">📦 Приход</a>
  <a href="compare.html">📅 Сравнение</a>
  <a href="pnl.html">💰 P&L</a>
  <a href="analytics.html">🔬 Аналитика</a>
  <a href="quality.html">🧪 Качество</a>
</div>

<div class="toolbar">
  <div class="filter-row">
    <select id="fSup" onchange="applyFilters()">
      <option value="">Все поставщики</option>
    </select>
    <select id="fSku" onchange="applyFilters()">
      <option value="">Все SKU</option>
    </select>
    <input type="text" id="fSearch" placeholder="🔍 Поиск..." oninput="applyFilters()" style="width:160px">
    <select id="fMonth" onchange="applyFilters()">
      <option value="">Все месяцы</option>
      <option value="2026-01">Январь 2026</option>
      <option value="2026-02">Февраль 2026</option>
      <option value="2026-03">Март 2026</option>
      <option value="2026-04">Апрель 2026</option>
    </select>
    <button class="btn" id="fConflict" onclick="toggleConflictFilter()">⚠️ Только конфликты</button>
    <button class="btn" onclick="clearFilters()">✕ Сбросить</button>
  </div>
  <div id="conflictBadge" class="conflict-badge" onclick="toggleConflictPanel()" style="display:none">
    <div class="conflict-dot"></div>
    <span id="conflictCount">0</span> конфликтов цен
    <span style="font-size:10px;opacity:.7">▼</span>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-v" style="color:var(--accent)" id="kTotal">—</div><div class="kpi-l">Строк</div></div>
    <div class="kpi"><div class="kpi-v" style="color:var(--text)" id="kQty">—</div><div class="kpi-l">Кол-во</div></div>
    <div class="kpi"><div class="kpi-v" style="color:var(--green)" id="kSum">—</div><div class="kpi-l">Сумма</div></div>
    <div class="kpi"><div class="kpi-v" style="color:var(--purple)" id="kSumNds">—</div><div class="kpi-l">НДС</div></div>
  </div>
</div>

<!-- Conflict panel -->
<div class="conflict-panel" id="conflictPanel">
  <h3>🔴 Конфликты цен — одна SKU, одна дата, один поставщик, разные цены</h3>
  <div class="conflict-list" id="conflictList"></div>
</div>

<div class="wrap">
  <table>
    <thead>
      <tr id="thead">
        <th onclick="sortBy('sku')" id="th_sku">Номенклатура</th>
        <th onclick="sortBy('sup')" id="th_sup">Поставщик</th>
        <th onclick="sortBy('dt')" id="th_dt">Дата</th>
        <th onclick="sortBy('qty')" id="th_qty">Кол-во</th>
        <th onclick="sortBy('price')" id="th_price">Цена ₸</th>
        <th onclick="sortBy('sum')" id="th_sum">Сумма ₸</th>
        <th onclick="sortBy('sum_nds')" id="th_sum_nds">НДС ₸</th>
        <th>Статус</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="pagebar">
  <button class="page-btn" id="btnPrev" onclick="changePage(-1)">← Назад</button>
  <span class="page-info" id="pageInfo">—</span>
  <button class="page-btn" id="btnNext" onclick="changePage(1)">Вперёд →</button>
  <span id="totalInfo" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
</div>

<script src="pf-prikhod.js?v=20260429"></script>
<script>
const PAGE_SIZE = 200;
const PUB_ID = '2PACX-1vTwyEj5Huy-avrqvCZj1rCqTBJObnOHNJ-GVdZic0J1_fwVafku2G0MpiZtGle8zOXzUUmEer26ylrO';
const GID_PRIHOD = '1270219264';

let allRows = [];  // loaded from Sheets CSV
let filtered = [];
let sortCol = 'dt', sortDir = -1;
let page = 0;
let showOnlyConflicts = false;

function fmt(n){ return Math.round(n).toLocaleString('ru'); }
function fmtP(n){ return (+n).toLocaleString('ru',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// Build conflict lookup from PRIKHOD_CONFLICTS
const conflictSet = new Set();
if(typeof PRIKHOD_CONFLICTS !== 'undefined'){
  for(const c of PRIKHOD_CONFLICTS){
    conflictSet.add(c.sku+'|'+c.dt);
  }
  if(PRIKHOD_CONFLICTS.length > 0){
    document.getElementById('conflictBadge').style.display='flex';
    document.getElementById('conflictCount').textContent = PRIKHOD_CONFLICTS.length;
    document.getElementById('conflictList').innerHTML = PRIKHOD_CONFLICTS.map(c=>`
      <div class="conflict-item">
        <div class="ci-sku" title="${c.sku}">${c.sku}</div>
        <div class="ci-info">${c.dt} · ${c.sup||''}  </div>
        <div class="ci-prices">Цены: ${c.prices.map(p=>p+' ₸').join(', ')}</div>
      </div>`).join('');
  }
}

// Parse CSV row
function parseCSV(text){
  const lines = text.split('
');
  const rows = [];
  for(const line of lines){
    if(!line.trim()) continue;
    const cols = []; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=ch;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

async function loadData(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--muted)">⏳ Загрузка из Google Sheets...</td></tr>';
  try{
    const url=`https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${GID_PRIHOD}&single=true&output=csv`;
    const text = await (await fetch(url)).text();
    const rows = parseCSV(text);
    if(rows.length < 2){ throw new Error('Нет данных'); }
    const h = rows[0].map(c=>c.toLowerCase().replace(/\s/g,''));
    const fi = k => h.findIndex(c=>c.includes(k));
    const iSku=fi('номенклатура'); const iSup=fi('поставщик')||fi('организация');
    const iDt=fi('период')||fi('дата'); const iQty=fi('количество');
    const iPrice=fi('цена'); const iSum=fi('сумма');
    const iNds=fi('ндс')||fi('nds');

    allRows = [];
    const fSup=document.getElementById('fSup');
    const fSku=document.getElementById('fSku');
    const supSet=new Set(), skuSet=new Set();

    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const sku=r[iSku]||''; if(!sku||sku==='Номенклатура') continue;
      const dt=(r[iDt]||'').trim().slice(0,10);
      if(!dt) continue;
      const sup=r[iSup]||'';
      const qty=parseFloat(r[iQty])||0;
      const price=parseFloat(r[iPrice])||0;
      const sum=parseFloat(r[iSum])||0;
      const nds=parseFloat(r[iNds])||0;
      const conflict=conflictSet.has(sku+'|'+dt);
      allRows.push({sku,sup,dt,qty,price,sum,sum_nds:nds,conflict});
      supSet.add(sup); skuSet.add(sku);
    }

    // Populate filters
    fSup.innerHTML='<option value="">Все поставщики</option>';
    fSku.innerHTML='<option value="">Все SKU</option>';
    [...supSet].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.length>40?s.slice(0,40)+'…':s;fSup.appendChild(o);});
    [...skuSet].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.length>50?s.slice(0,50)+'…':s;fSku.appendChild(o);});

    applyFilters();
  }catch(e){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--red)">❌ Ошибка загрузки: ${e.message}</td></tr>`;
  }
}

function applyFilters(){
  const sup = document.getElementById('fSup').value;
  const sku = document.getElementById('fSku').value;
  const search = document.getElementById('fSearch').value.toLowerCase();
  const month = document.getElementById('fMonth').value;
  filtered = allRows.filter(r=>{
    if(sup && r.sup !== sup) return false;
    if(sku && r.sku !== sku) return false;
    if(month && !r.dt.startsWith(month)) return false;
    if(search && !r.sku.toLowerCase().includes(search) && !r.sup.toLowerCase().includes(search)) return false;
    if(showOnlyConflicts && !r.conflict) return false;
    return true;
  });
  sortAndRender();
}

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
  document.querySelectorAll('thead th').forEach(th=>th.className='');
  const th = document.getElementById('th_'+col);
  if(th) th.className = sortDir===-1?'sa':'sd';
  sortAndRender();
}

function sortAndRender(){
  filtered.sort((a,b)=>{
    const av=a[sortCol]||'', bv=b[sortCol]||'';
    if(typeof av==='number') return (av-bv)*sortDir;
    return av.localeCompare(bv,'ru')*sortDir;
  });
  page=0; render();
}

function render(){
  const start=page*PAGE_SIZE, end=Math.min(start+PAGE_SIZE,filtered.length);
  const slice=filtered.slice(start,end);

  // KPIs
  const totQty=filtered.reduce((s,r)=>s+r.qty,0);
  const totSum=filtered.reduce((s,r)=>s+r.sum,0);
  const totNds=filtered.reduce((s,r)=>s+r.sum_nds,0);
  document.getElementById('kTotal').textContent=filtered.length.toLocaleString('ru');
  document.getElementById('kQty').textContent=fmt(totQty);
  document.getElementById('kSum').textContent=fmt(totSum)+' ₸';
  document.getElementById('kSumNds').textContent=fmt(totNds)+' ₸';

  // Table
  document.getElementById('tbody').innerHTML = slice.map(r=>{
    const cRow = r.conflict ? 'conflict-row' : '';
    const cIcon = r.conflict ? '<span class="conflict-icon" title="Конфликт цен в этот день для этого SKU">⚠️</span>' : '';
    const statCell = r.conflict
      ? `<td class="conflict-cell">⚠️ Конфликт цен</td>`
      : `<td style="color:var(--green);font-size:10px">✓ OK</td>`;
    return `<tr class="${cRow}">
      <td title="${r.sku}">${r.sku.length>45?r.sku.slice(0,45)+'…':r.sku}${cIcon}</td>
      <td title="${r.sup}">${r.sup.length>35?r.sup.slice(0,35)+'…':r.sup}</td>
      <td class="num">${r.dt}</td>
      <td class="num">${fmtP(r.qty)}</td>
      <td class="num" style="${r.conflict?'color:var(--red);font-weight:700':''}">${fmtP(r.price)}</td>
      <td class="num">${fmt(r.sum)}</td>
      <td class="num" style="color:var(--muted)">${fmt(r.sum_nds)}</td>
      ${statCell}
    </tr>`;
  }).join('');

  // Pagination
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
  document.getElementById('pageInfo').textContent=`Стр. ${page+1} из ${totalPages}`;
  document.getElementById('totalInfo').textContent=`Показано ${start+1}–${end} из ${filtered.length} строк`;
  document.getElementById('btnPrev').disabled=page===0;
  document.getElementById('btnNext').disabled=end>=filtered.length;
}

function changePage(d){ page+=d; render(); }
function toggleConflictPanel(){
  document.getElementById('conflictPanel').classList.toggle('show');
}
function toggleConflictFilter(){
  showOnlyConflicts=!showOnlyConflicts;
  document.getElementById('fConflict').classList.toggle('active',showOnlyConflicts);
  applyFilters();
}
function clearFilters(){
  fSup.value=''; fSku.value='';
  document.getElementById('fSearch').value='';
  document.getElementById('fMonth').value='';
  showOnlyConflicts=false;
  document.getElementById('fConflict').classList.remove('active');
  applyFilters();
}

// Init — load from Sheets
loadData();
</script>
</body>
</html>
